# xcodegen spec — `cd ios && xcodegen` generates SmartSaver.xcodeproj.
# https://github.com/yonaskolb/XcodeGen

name: SmartSaver

options:
  bundleIdPrefix: com.shakedivgi.smartsaver
  deploymentTarget:
    iOS: "17.0"
  developmentLanguage: en
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    CODE_SIGN_STYLE: Automatic
    # Leave blank so Xcode uses the Personal Team you set up under
    # Xcode → Settings → Accounts. Override on the CLI / in Xcode if needed.
    DEVELOPMENT_TEAM: ""
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    GENERATE_INFOPLIST_FILE: YES
    # When GENERATE_INFOPLIST_FILE=YES, the *static* CFBundleVersion /
    # CFBundleShortVersionString in our Info.plist are ignored — Xcode
    # sources them from these two build settings instead. iOS 26.5's
    # installer is strict about app-extension bundles having both, so
    # we set them project-wide and both targets inherit.
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  # ============================================ Main SwiftUI app
  SmartSaver:
    type: application
    platform: iOS
    sources:
      - path: SmartSaver
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shakedivgi.smartsaver
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_KEY_CFBundleDisplayName: Smart Saver
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    info:
      # `info.properties` MERGES with auto-generated keys (because
      # GENERATE_INFOPLIST_FILE=YES above). We only need the ATS exception.
      path: SmartSaver/SmartSaver-Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
    dependencies:
      - target: ShareExtension
        embed: true
        codeSign: true

  # ============================================ Share Extension
  ShareExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: ShareExtension
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shakedivgi.smartsaver.ShareExtension
        INFOPLIST_KEY_CFBundleDisplayName: Save to Smart Saver
        TARGETED_DEVICE_FAMILY: "1,2"
        SKIP_INSTALL: YES
    info:
      path: ShareExtension/ShareExtension-Info.plist
      properties:
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
        NSExtension:
          NSExtensionPointIdentifier: com.apple.share-services
          # Hardcoded on purpose: modern Xcode does NOT preprocess custom
          # Info.plist values, so `$(PRODUCT_MODULE_NAME)` would land as a
          # literal string and the installer rejects it with
          # "Invalid placeholder attributes". The module name defaults to
          # the target name, so "ShareExtension" is exact.
          NSExtensionPrincipalClass: ShareExtension.ShareViewController
          NSExtensionAttributes:
            NSExtensionActivationRule:
              NSExtensionActivationSupportsWebURLWithMaxCount: 1
              NSExtensionActivationSupportsText: 1

# Declaring schemes manually disables xcodegen's auto-scheme generation for
# every target — so only SmartSaver appears in Xcode's scheme picker and the
# extension never gets its own "run alone" scheme that prompts "choose a host
# app". The extension still gets built and embedded because SmartSaver depends
# on it.
schemes:
  SmartSaver:
    build:
      targets:
        SmartSaver: all
    run:
      config: Debug
    test:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
